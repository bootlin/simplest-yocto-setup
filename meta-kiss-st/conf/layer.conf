# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-kiss-st"
BBFILE_PATTERN_meta-kiss-st = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-kiss-st = "9"

LAYERDEPENDS_meta-kiss-st = "core meta-arm meta-kiss"
LAYERSERIES_COMPAT_meta-kiss-st = "scarthgap"
