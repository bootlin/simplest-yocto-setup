header:
  version: 11

machine: dogbonedark
distro: kiss
target:
  - kiss-image

repos:
  bitbake:
    url: "https://git.openembedded.org/bitbake"
    branch: "2.8"
    layers:
      .: disabled

  openembedded-core:
    url: "https://git.openembedded.org/openembedded-core"
    branch: scarthgap
    layers:
      meta:

  meta-openembedded:
    url: "https://git.openembedded.org/meta-openembedded.git"
    branch: scarthgap
    layers:
      meta-oe:
      meta-python:

  meta-arm:
    url: "https://git.yoctoproject.org/meta-arm"
    branch: scarthgap
    layers:
      meta-arm-toolchain:
      meta-arm:

  meta-xilinx:
    url: https://github.com/Xilinx/meta-xilinx.git
    branch: scarthgap
    patches:
      0001:
        repo: meta-kiss
        path: kas_patches/meta-xilinx/0001-meta-microblaze-Remove-util-linux-bbappend.patch
    layers:
      meta-microblaze:

  meta-kiss:
    layers:
      meta-kiss:

local_conf_header:
  meta-kiss: |
    # Some useful lines you may want to copy to your site.conf for development
    # INHERIT += "rm_work"
    # EXTRA_IMAGE_FEATURES += "empty-root-password \
    #                          allow-empty-password \
    #                          allow-root-login \
    #                          "
    # LICENSE_FLAGS_ACCEPTED += "NXP_EULA_v57 NXP_EULA_v58"
