# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-kiss-amd"
BBFILE_PATTERN_meta-kiss-amd = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-kiss-amd = "9"

LAYERDEPENDS_meta-kiss-amd = "core meta-arm meta-kiss meta-python"
LAYERSERIES_COMPAT_meta-kiss-amd = "scarthgap"
